{% extends "base.html" %}
{% block title %}Connexion - AssurancePharma{% endblock %}
{% block content %}
<div class="auth-page">
  <div class="auth-card">
    <div class="auth-logo">
      <img src="{{ url_for('static', filename='icons/Coupe_Hygie2.png') }}" alt="Logo" style="width:44px;height:44px;object-fit:contain;">
    </div>
    <h1 class="text-center mb-1 h4 fw-bold">AssurancePharma</h1>
    <p class="text-center text-muted mb-4 small">Gestion de pharmacie</p>

    <form method="POST" action="">
      <div class="mb-3">
        <label for="email" class="form-label">Email</label>
        <div class="input-group">
          <span class="input-group-text"><i class="fas fa-envelope"></i></span>
          <input type="email" class="form-control" id="email" name="email" placeholder="votre@email.com" required autofocus />
        </div>
      </div>
      <div class="mb-3">
        <label for="password" class="form-label">Mot de passe</label>
        <div class="input-group">
          <span class="input-group-text"><i class="fas fa-lock"></i></span>
          <input type="password" class="form-control" id="password" name="password" placeholder="..." required />
        </div>
      </div>
      <button type="submit" class="btn btn-primary w-100 py-2 mt-2">
        <i class="fas fa-sign-in-alt"></i> Connexion
      </button>
    </form>
  </div>
</div>
{% endblock %}

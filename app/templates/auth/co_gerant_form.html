{% extends "base.html" %}
{% block title %}Nouveau Co-gérant - AssurancePharma{% endblock %}
{% block content %}
<div class="fade-in">
  <h1 class="page-title"><i class="fas fa-user-plus"></i> Nouveau Co-gérant</h1>

  <div class="row justify-content-center">
    <div class="col-md-6">
      <div class="card">
        <div class="card-body">
          <form method="POST">
            <div class="mb-3">
              <label class="form-label">Nom *</label>
              <input type="text" name="nom" class="form-control" required>
            </div>
            <div class="mb-3">
              <label class="form-label">Prénom *</label>
              <input type="text" name="prenom" class="form-control" required>
            </div>
            <div class="mb-3">
              <label class="form-label">Email *</label>
              <input type="email" name="email" class="form-control" required>
            </div>
            <div class="mb-3">
              <label class="form-label">Mot de passe *</label>
              <input type="password" name="password" class="form-control" required minlength="4">
              <small class="text-muted">Minimum 4 caractères</small>
            </div>
            <div class="d-flex gap-2">
              <button type="submit" class="btn btn-success"><i class="fas fa-save"></i> Créer</button>
              <a href="{{ url_for('auth.list_co_gerants') }}" class="btn btn-secondary">Annuler</a>
            </div>
          </form>
        </div>
      </div>
    </div>
  </div>
</div>
{% endblock %}
